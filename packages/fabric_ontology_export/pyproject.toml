[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "fabric-ontology-export"
version = "1.0.0"
description = "Export Microsoft Fabric Ontology definitions to a lakehouse folder"
requires-python = ">=3.10"
dependencies = ["requests>=2.28"]

[tool.setuptools.packages.find]
where = ["."]
