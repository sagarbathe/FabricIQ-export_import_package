[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "fabric-ontology-import"
version = "1.0.0"
description = "Import Microsoft Fabric Ontology definitions from a lakehouse folder"
requires-python = ">=3.10"
dependencies = ["requests>=2.28"]

[tool.setuptools.packages.find]
where = ["."]
